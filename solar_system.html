<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solar System Visualization</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06060f;color:#c8d8f0;font-family:'Segoe UI',Arial,sans-serif}
#app{display:flex;flex-direction:column;height:100vh;padding:8px;gap:6px}

/* Canvas */
#canvasWrap{flex:1;position:relative;min-height:0}
#cv{display:block;width:100%;height:100%;cursor:crosshair}

/* Slider row */
#sliderRow{display:flex;align-items:center;gap:6px;height:52px}
#sliderRow label{color:#80a0c0;font-size:9pt;white-space:nowrap;cursor:pointer;user-select:none}
#sliderRow label:hover{color:#a0c8f0}
#sliderWrap{flex:1;position:relative;height:52px}
#timeSlider{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#1a2a4a;border-radius:3px;outline:none;cursor:pointer;position:absolute;top:50%;transform:translateY(-50%)}
#timeSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#4a8ad0;border:1px solid #6aaaf0;cursor:pointer}
#timeSlider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#4a8ad0;border:1px solid #6aaaf0;cursor:pointer}
#sliderCanvas{position:absolute;top:0;left:0;pointer-events:none}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:3px;flex-wrap:wrap;min-height:34px}
.btn{background:#1a2a4a;color:#90c0e8;border:1px solid #2a4a7a;border-radius:6px;padding:2px 7px;font-size:11pt;cursor:pointer;height:30px;min-width:30px;font-family:'Segoe UI Symbol','Segoe UI Emoji',Arial,sans-serif;white-space:nowrap;transition:background .15s}
.btn:hover{background:#253a60}
.btn:active{background:#0e1a30}
.btn.active{background:#1a4a2a;border-color:#2a8a4a;color:#60e880}
.btn:disabled{opacity:.4;cursor:default}
.lbl{color:#80a0c0;font-size:9pt;white-space:nowrap;padding:0 2px}
.sep{width:1px;height:22px;background:#2a4a7a;margin:0 4px}
input[type=range].inlineSlider{-webkit-appearance:none;appearance:none;height:6px;background:#1a2a4a;border-radius:3px;outline:none;cursor:pointer}
input[type=range].inlineSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#4a8ad0;border:1px solid #6aaaf0;cursor:pointer}
input[type=range].inlineSlider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#4a8ad0;border:1px solid #6aaaf0;cursor:pointer}
.valLbl{color:#a0c0e8;font-size:9pt;min-width:40px;text-align:left}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#0d1a30;border:1px solid #2a4a7a;border-radius:10px;padding:20px;min-width:300px;max-width:400px;color:#c8d8f0}
.modal h2{font-size:13pt;margin-bottom:14px;color:#a0c8f0}
.modal label{display:block;font-size:9pt;color:#80a0c0;margin-bottom:4px}
.modal input,.modal select{width:100%;background:#0a1528;border:1px solid #2a4a7a;border-radius:4px;color:#c8d8f0;padding:4px 6px;font-size:10pt;margin-bottom:10px}
.modal .row{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal .btn{font-size:10pt}

/* Tooltip */
[title]{cursor:default}

/* ── Mobile / iPad responsive ──────────────────────────────── */
@media (pointer:coarse){
  .btn{height:40px;min-width:40px;font-size:13pt;padding:4px 10px}
  #timeSlider::-webkit-slider-thumb{width:24px;height:24px}
  #timeSlider::-moz-range-thumb{width:24px;height:24px}
  input[type=range].inlineSlider::-webkit-slider-thumb{width:20px;height:20px}
  input[type=range].inlineSlider::-moz-range-thumb{width:20px;height:20px}
  #timeSlider{height:8px}
  input[type=range].inlineSlider{height:8px}
}
@media (max-width:900px){
  #toolbar{flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
  #toolbar::-webkit-scrollbar{display:none}
  .sep,.btn,.lbl,.valLbl,input[type=range].inlineSlider{flex-shrink:0}
  .modal{min-width:unset;width:92vw;max-width:92vw;padding:16px}
  #sliderRow{height:48px}
}
@media (max-width:540px){
  #app{padding:2px;gap:3px}
  .valLbl{font-size:8pt;min-width:26px}
  .lbl{font-size:8pt}
  #speedSlider{width:64px!important}
  #volSlider{width:44px!important}
  #warpSpeedSlider{width:48px!important}
  #constScaleSlider{width:42px!important}
  #planetSlider{width:60px!important}
  #sunSlider{width:48px!important}
  #moonSlider{width:48px!important}
  #zoomSlider{width:80px!important}
}
</style>
</head>
<body>
<div id="app">
  <div id="canvasWrap"><canvas id="cv"></canvas></div>

  </div>

  <!-- Toolbar -->

    <button class="btn" id="btnPlay" title="Play / Pause">▶</button>

      <span id="settLblOpacity" style="font-size:9pt;color:#80a0c0">Opacity</span>
      <input type="range" class="inlineSlider" id="settStarOpacity" min="10" max="200" value="100" style="width:100%"/>
      <span id="settStarOpacityVal" style="font-size:9pt;color:#a0c0e8;min-width:30px">100%</span>
    </div>
    <label id="settLblMinAlign">Min planets for alignment marks:</label>

    <label id="settLblDateMin" style="margin-top:6px">Slider start date: <span id="settLblDateHint" style="color:#5a9ad0;font-size:8pt">(YYYY-MM-DD)</span></label>
    <input type="text" id="settDateMin" placeholder="2024-01-01" maxlength="10" autocomplete="off" spellcheck="false"/>

    <div class="row">

  </div>
</div>

</div>

const J2000 = new Date('2000-01-01T00:00:00Z');
function daysSinceJ2000(d){
  // return fractional days for sub-day orbital precision
  return (d - J2000)/86400000;
}
function dateFromOffset(baseDate, offset){
  // offset in fractional days → use ms for sub-day precision
  return new Date(baseDate.getTime() + offset * 86400000);
}
function dateToISO(d){
  return d.toISOString().slice(0,10);
}
function isoToDate(s){
  const [y,m,day]=s.split('-').map(Number);
  return new Date(Date.UTC(y,m-1,day));
}

// ─────────────────────────────────────────────────────────────────────────────
// ORBITAL MATH
// ─────────────────────────────────────────────────────────────────────────────
function planetAngleDeg(planet, d){
  const days=daysSinceJ2000(d);
  return ((planet.mean_lon + 360*days/planet.period) % 360 + 360) % 360;
}
/** Geocentric ecliptic longitude (degrees) — for zodiac sign lookup */
function geoEclLonDeg(planet, d){
  const earth=PLANETS[2];
  if(planet.name==='Earth'){
    // Sun as seen from Earth = Earth heliocentric lon + 180°
    return ((planetAngleDeg(earth,d)+180)%360+360)%360;
  }
  const eAng=planetAngleDeg(earth,d)*Math.PI/180;
  const pAng=planetAngleDeg(planet,d)*Math.PI/180;
  const ex=earth.au*Math.cos(eAng), ey=earth.au*Math.sin(eAng);
  const px=planet.au*Math.cos(pAng), py=planet.au*Math.sin(pAng);
  return (Math.atan2(py-ey,px-ex)*180/Math.PI%360+360)%360;
}
function computeMoonPhaseAngle(d){
  const days=daysSinceJ2000(d);
  const moon=MOONS.Earth[0];
  const moonLon=((moon.mean_lon + 360*days/moon.period)%360+360)%360;
  const earth=PLANETS[2];
  const earthLon=planetAngleDeg(earth,d);
  const sunGeo=(earthLon+180)%360;
  return ((moonLon-sunGeo)%360+360)%360;
}
function moonPhaseInfo(d){
  const angle=computeMoonPhaseAngle(d);
  const idx=Math.floor((angle+22.5)/45)%8;
  const illum=Math.round((1-Math.cos(angle*Math.PI/180))/2*100);
  const L=LOCALE[state&&state.lang]||LOCALE.en;
  return {symbol:MOON_PHASE_SYMBOLS[idx],name:L.moonPhaseNames[idx],illum,angle};
}
function lonDiff(a,b){
  let d=(b-a)%360;
  if(d>180) d-=360;
  if(d<-180) d+=360;
  return d;
}

// ─────────────────────────────────────────────────────────────────────────────
function countAlignment(d,threshold=15){
  const angles=PLANETS.map(p=>planetAngleDeg(p,d)).sort((a,b)=>a-b);
  const n=angles.length;
  const ext=[...angles,...angles.map(a=>a+360)];
  let best=0;
  for(let i=0;i<n;i++){
    let j=i;
    while(j<i+n && ext[j]-ext[i]<=threshold) j++;
    best=Math.max(best,j-i);
  }
  return best;
}
function alignMarkColor(count){
  const t=Math.max(0,Math.min(1,(count-3)/5));
  let r,g,b;
  if(t<0.33){const s=t/0.33;r=30;g=Math.round(80+s*140);b=Math.round(255-s*175);}
  else if(t<0.67){const s=(t-0.33)/0.34;r=Math.round(30+s*210);g=220;b=Math.round(80-s*50);}
  else{const s=(t-0.67)/0.33;r=255;g=Math.round(220-s*170);b=30;}
  return `rgba(${r},${g},${b},0.87)`;
}
function computeAlignments(dateMin,dateMax,minPlanets=3){
  const marks=[];
  const total=Math.round((dateMax-dateMin)/86400000);
  let cooldown=0;
  for(let i=0;i<=total;i++){
    if(cooldown>0){cooldown--;continue;}
    const d=dateFromOffset(dateMin,i);
    const cnt=countAlignment(d);
    if(cnt>=minPlanets){marks.push({offset:i,count:cnt});cooldown=7;}
  }
  return marks;
}

// SOLAR TERMS
// ─────────────────────────────────────────────────────────────────────────────
function computeSolarTerms(dateMin,dateMax){
  const earth=PLANETS[2];
  const results=[];
  const total=Math.round((dateMax-dateMin)/86400000);
  let prev=null;
  for(let i=0;i<=total+2;i++){
    const d=dateFromOffset(dateMin,i);
    const lon=((planetAngleDeg(earth,d)+180)%360+360)%360;
    if(prev!==null){
      const step=((lon-prev)%360+360)%360;
      if(step>0&&step<5){
        for(const [target,kind] of ST_TARGETS){
          const gap=((target-prev)%360+360)%360;
          if(gap<step){
            const frac=step>0?gap/step:0;
            results.push({offset:Math.max(0,i-1+frac),kind});
          }
        }
      }
    }
    prev=lon;
  }
  return results;
}

function buildStars(w,h){
  const arr=[];
  // deterministic LCG
  let seed=42;
  function rand(){seed=(seed*1664525+1013904223)&0xffffffff;return(seed>>>0)/4294967296;}
  const count=state.starDensity||280;
  const sizeScale=state.starSize||1.0;
  for(let i=0;i<count;i++){
    const x=Math.floor(rand()*w);
    const y=Math.floor(rand()*h);
    const r=rand();
    const a=Math.floor(r*70+20);
    const s=r*1.6*sizeScale;
    // Stellar colour classes: blue-white, white, yellow-white, orange, red
    const cr=rand();
    let sr,sg,sb;
    if(cr<0.45){        // blue-white (A/B class)
      sr=200+Math.floor(rand()*30); sg=215+Math.floor(rand()*25); sb=245+Math.floor(rand()*10);
    } else if(cr<0.68){ // white (F/G class)
      sr=245+Math.floor(rand()*10); sg=245+Math.floor(rand()*10); sb=240+Math.floor(rand()*15);
    } else if(cr<0.82){ // yellow-white (G/K class — sun-like)
      sr=255; sg=230+Math.floor(rand()*22); sb=160+Math.floor(rand()*70);
    } else if(cr<0.92){ // orange (K class)
      sr=255; sg=185+Math.floor(rand()*35); sb=100+Math.floor(rand()*60);
    } else {            // red (M class)
      sr=255; sg=130+Math.floor(rand()*50); sb=100+Math.floor(rand()*60);
    }
    arr.push({x,y,a,s,r:sr,g:sg,b:sb});
  }
  return arr;
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function colorAlpha(hex,a){
  const {r,g,b}=hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function lighten(hex,pct){
  let {r,g,b}=hexToRgb(hex);
  r=Math.min(255,Math.round(r+(255-r)*pct/100));
  g=Math.min(255,Math.round(g+(255-g)*pct/100));
  b=Math.min(255,Math.round(b+(255-b)*pct/100));
  return `rgb(${r},${g},${b})`;
}
function darken(hex,pct){
  let {r,g,b}=hexToRgb(hex);
  r=Math.max(0,Math.round(r*(1-pct/100)));
  g=Math.max(0,Math.round(g*(1-pct/100)));
  b=Math.max(0,Math.round(b*(1-pct/100)));
  return `rgb(${r},${g},${b})`;
}

function draw(){
  const w=cv.width, h=cv.height;
  if(!w||!h) return;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#06060f';
  ctx.fillRect(0,0,w,h);

  // Stars (suppressed during warp — tickWarp draws animated versions instead)
  if(!starsCache) starsCache=buildStars(w,h);
  if(!state.warpMode){
    const starOp=state.starOpacity||1.0;
    for(const s of starsCache){
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${s.r},${s.g},${s.b},${Math.min(1,s.a/255*starOp)})`;
      ctx.fill();
    }
  }

  const cx=w/2, cy=h/2;
  const MAX_AU=38;
  const scale=Math.min(w,h)/2/MAX_AU*0.92*state.zoom;
  const n=PLANETS.length;
  const halfCanvas=Math.min(w,h)/2;
  const zodiacInner=halfCanvas*0.80;
  const evenStep=zodiacInner/(n+1);

  const geoEvenMode=state.geoMode&&state.evenMode;
  const earth=PLANETS[2];
  const earthOrbitR=earth.au*scale; // always real AU for geocentric offset calc
  const earthAngle=planetAngleDeg(earth,state.currentDate)*Math.PI/180;
  const earthHx=earthOrbitR*Math.cos(earthAngle);
  const earthHy=-earthOrbitR*Math.sin(earthAngle);

  // translate: geo+even → Earth at canvas centre; geo only → Earth at centre via offset; helio → canvas centre
  const tx=state.geoMode ? cx-earthHx : cx;
  const ty=state.geoMode ? cy-earthHy : cy;

  // Zodiac (geo mode only)
  if(state.geoMode){
    ctx.save();
    ctx.translate(cx,cy);
    if(state.showSectors) drawZodiacSectors(w,h);
    if(state.showZodiac)  drawZodiac(w,h);
    ctx.restore();
  }

  ctx.save();
  ctx.translate(tx,ty);

  // Trails
  if(state.showTrail && state.geoMode && state.selectedPlanet)
    drawTrails(scale,earthHx,earthHy,evenStep);

  if(geoEvenMode){
    // ── GEO + EVEN MODE ───────────────────────────────────────────────────────
    // Sub-translate: make (0,0) = Earth = canvas centre
    ctx.translate(earthHx,earthHy);

    // Sun screen position: geocentric direction, scaled to inner slot.
    const nonEarth=PLANETS.filter(p=>p.name!=='Earth');
    const zodI=evenStep*(PLANETS.length+1);    // = zodiacInner
    const sunGeoAngle=earthAngle+Math.PI;
    const sunEvR=zodI*0.18;                    // Sun at 18% of zodiacInner
    const sunSX=sunEvR*Math.cos(sunGeoAngle);
    const sunSY=-sunEvR*Math.sin(sunGeoAngle);
    drawSun(scale,evenStep,sunSX,sunSY);



    // Draw each planet: orbit circle centred on Sun, scaled so avg
    // geocentric dist ≈ geoEvenRingR (non-uniform: inner 2×, outer 1×).
    for(const key in planetScreenPos) delete planetScreenPos[key];

    // Earth at canvas centre
    const earthPlanet=PLANETS[2];
    planetScreenPos['Earth']={x:cx,y:cy,r:earthPlanet.size/2*state.planetScale};
    drawPlanet(earthPlanet,0,0,scale,evenStep);

    for(const planet of nonEarth){
      const ringRGE=geoEvenRingR(planet.name,evenStep);
      // Average geocentric distance in AU ≈ sqrt(earth.au²+planet.au²)
      const avgGeoDist=Math.sqrt(earth.au*earth.au+planet.au*planet.au);
      // Scale factor: stretch/compress planet's helio orbit so avg geo = ringRGE
      const sp=ringRGE/(avgGeoDist*scale);

      const pAng=planetAngleDeg(planet,state.currentDate)*Math.PI/180;
      const px=sunSX+sp*planet.au*scale*Math.cos(pAng);
      const py=sunSY-sp*planet.au*scale*Math.sin(pAng);
      // Canvas coords: translated space origin is at (cx,cy) after sub-translate
      planetScreenPos[planet.name]={x:cx+px,y:cy+py,r:planet.size/2*state.planetScale};
      drawPlanet(planet,px,py,scale,evenStep);
    }
  } else {
    // ── NORMAL / HELIO / GEO (non-even) ──────────────────────────────────────
    drawSun(scale,evenStep,0,0);

    for(const key in planetScreenPos) delete planetScreenPos[key];
    for(let idx=0;idx<PLANETS.length;idx++){
      const planet=PLANETS[idx];
      const orbitR=(state.evenMode&&!state.geoMode) ? evenStep*(idx+1) : planet.au*scale;
      if(!state.geoMode){
        const showOrbit=state.selectedPlanet===null||state.selectedPlanet===planet.name;
        if(showOrbit) drawOrbit(orbitR);
      }
      const angleDeg=planetAngleDeg(planet,state.currentDate);
      const ar=angleDeg*Math.PI/180;
      const px=orbitR*Math.cos(ar);
      const py=-orbitR*Math.sin(ar);
      const pr=planet.size/2*state.planetScale;
      planetScreenPos[planet.name]={x:tx+px,y:ty+py,r:pr};
      drawPlanet(planet,px,py,scale,evenStep);
    }
  }

  ctx.restore();

  // Overlays (no translate)
  drawDateLabel(w,h);
  drawMoonPhaseOverlay(w,h);
  drawSunArcOverlay(w,h);
  if(state.showInfo && state.selectedPlanet) drawInfoPanel(w,h);
  // Constellations overlay drawn last so labels appear on top
  // Suppress hover highlight during playback so it doesn't interfere with animation
  if(state.showConstellations) drawConstellations(w,h,state.playing?null:constMouseX,state.playing?null:constMouseY);
}

function drawOrbit(r){
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle=state.geoMode ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.16)';
  ctx.lineWidth=state.geoMode ? 1 : 1.8;
  ctx.setLineDash([4,4]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawSun(scale,evenStep,ox,oy){
  ox=ox||0; oy=oy||0;
  let sunR;
  if(state.evenMode&&evenStep>0) sunR=evenStep*0.38;
  else sunR=Math.max(6,scale*0.12);
  sunR*=(state.sunScale||1.0);

  const glows=[{r:sunR*3.8,a:0.07},{r:sunR*2.8,a:0.14},{r:sunR*2.0,a:0.24},{r:sunR*1.4,a:0.47}];
  for(const g of glows){
    const gr=ctx.createRadialGradient(ox,oy,0,ox,oy,g.r);
    gr.addColorStop(0,`rgba(255,230,100,${g.a})`);
    gr.addColorStop(1,'rgba(255,150,50,0)');
    ctx.beginPath(); ctx.arc(ox,oy,g.r,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
  }
  const off=sunR*0.25;
  const gr=ctx.createRadialGradient(ox-off,oy-off,0,ox-off,oy-off,sunR*1.1);
  gr.addColorStop(0,'#ffffc8');
  gr.addColorStop(0.6,'#ffc850');
  gr.addColorStop(1,'#e6821e');
  ctx.beginPath(); ctx.arc(ox,oy,sunR,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.fill();
}

function drawPlanet(planet,px,py,scale,evenStep){
  const color=planet.color;
  const r=planet.size/2*state.planetScale;

  // Selection ring
  if(state.selectedPlanet===planet.name){
    ctx.beginPath();
    ctx.arc(px,py,r+5,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,120,0.78)';
    ctx.lineWidth=2;
    ctx.stroke();
  }

  // Glow
  const gr=ctx.createRadialGradient(px,py,0,px,py,r*2.5);
  gr.addColorStop(0,colorAlpha(color,0.24));
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(px,py,r*2.5,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.fill();

  // Disk
  const dg=ctx.createRadialGradient(px-r*0.3,py-r*0.3,0,px,py,r*1.2);
  dg.addColorStop(0,lighten(color,50));
  dg.addColorStop(1,darken(color,23));
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle=dg; ctx.fill();

  // Geo grid lines (under shadow)
  if(state.showGeoLines && r>=4) drawPlanetGeoLines(px,py,r,planet);
  // Sun lighting / shadow overlay
  if(state.showSunLight && r>=3) drawPlanetLighting(px,py,r);

  // Saturn rings
  if(planet.name==='Saturn'){
    ctx.save();
    for(const [rr,lw] of [[r*1.7,2],[r*2.1,1.5],[r*2.5,1]]){
      ctx.beginPath();
      ctx.ellipse(px,py,rr,rr*0.35,0,0,Math.PI*2);
      ctx.strokeStyle='rgba(210,190,140,0.63)';
      ctx.lineWidth=lw;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Moons
  drawMoons(planet,px,py);

  // Label
  const _pnL=LOCALE[state.lang]||LOCALE.en;
  ctx.fillStyle=lighten(color,60);
  ctx.font=`10px 'Segoe UI',Arial,sans-serif`;
  ctx.fillText(_pnL.planetNames[planet.name]||planet.name, px+r+3, py-r);
}

// Draw latitude/longitude grid — top-down polar (North Pole) projection
function drawPlanetGeoLines(px,py,r,planet){
  const days=daysSinceJ2000(state.currentDate);
  const spinDir=planet.spin_days<0?-1:1;
  const rot=((days*360/Math.abs(planet.spin_days)*spinDir)%360+360)%360;
  const lw=state.geoLineWidth||1.0;
  const lc=state.geoLineColor||'#64b4ff';
  function hexToRgba(hex,a){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  ctx.save();
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.clip();

  // --- Parallels: concentric circles
  // In polar (top-view) projection: circle radius = r * cos(lat)
  // equator(0°) at full r, 30° at r*0.866, 60° at r*0.5, poles at 0
  for(const lat of [60,30,0,-30,-60]){
    const circR=r*Math.cos(lat*Math.PI/180);
    if(circR<1) continue;
    ctx.beginPath();
    ctx.arc(px,py,circR,0,Math.PI*2);
    ctx.strokeStyle=lat===0?hexToRgba(lc,0.55):hexToRgba(lc,0.24);
    ctx.lineWidth=(lat===0?1.1:0.6)*lw;
    ctx.stroke();
  }

  // --- Meridians: spokes every geoLineDensity degrees, rotating
  const meridStep=state.geoLineDensity||30;
  for(let lon=0;lon<360;lon+=meridStep){
    const ang=(((lon-rot)%360+360)%360)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px+r*Math.cos(ang), py+r*Math.sin(ang));
    ctx.strokeStyle=hexToRgba(lc,0.24);
    ctx.lineWidth=0.6*lw;
    ctx.stroke();
  }

  // Equatorial ring at 0° — also add parallels matching density step
  const parallelStep=meridStep;
  for(let lat=parallelStep;lat<90;lat+=parallelStep){
    for(const sign of[1,-1]){
      const circR=r*Math.cos(lat*sign*Math.PI/180);
      if(circR<1) continue;
      ctx.beginPath(); ctx.arc(px,py,circR,0,Math.PI*2);
      ctx.strokeStyle=hexToRgba(lc,0.20); ctx.lineWidth=0.5*lw; ctx.stroke();
    }
  }

  // Pole dot at centre
  ctx.beginPath(); ctx.arc(px,py,Math.max(1.5,r*0.045),0,Math.PI*2);
  ctx.fillStyle=hexToRgba(lc,0.55); ctx.fill();

  ctx.restore();
}

// Draw sun-shadow (terminator) overlay
function drawPlanetLighting(px,py,r){
  // Sun is at (0,0) in translated planet-canvas coords
  const toSunAngle=Math.atan2(-py,-px);
  const litX=px+r*Math.cos(toSunAngle);
  const litY=py+r*Math.sin(toSunAngle);
  const darkX=px-r*Math.cos(toSunAngle);
  const darkY=py-r*Math.sin(toSunAngle);

  ctx.save();
  ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.clip();

  const sg=ctx.createLinearGradient(litX,litY,darkX,darkY);
  sg.addColorStop(0.0,'rgba(0,0,0,0)');
  sg.addColorStop(0.44,'rgba(0,0,0,0)');
  sg.addColorStop(0.58,'rgba(0,0,0,0.50)');
  sg.addColorStop(0.78,'rgba(0,0,0,0.72)');
  sg.addColorStop(1.0,'rgba(0,0,0,0.90)');
  ctx.fillStyle=sg;
  ctx.fillRect(px-r,py-r,r*2,r*2);

  ctx.restore();
}

function drawMoons(planet,px,py){
  const moons=MOONS[planet.name];
  if(!moons||!moons.length) return;
  const planetR=planet.size/2;
  const days=daysSinceJ2000(state.currentDate);
  const geoEarth=state.geoMode && planet.name==='Earth';
  const geoEven=state.geoMode && state.evenMode && planet.name==='Earth';
  const soloEarth=!state.geoMode && planet.name==='Earth';
  const moonOrbitMult=geoEven?0.65:(geoEarth?1.5:(soloEarth?1.2:1.0));
  const moonSizeMult=geoEven?2.0:(geoEarth?3.5:(soloEarth?2.5:1.0));

  const maxAu=Math.max(...moons.map(m=>m.au));

  for(const moon of moons){
    let orbitR;
    if(state.evenMode){
      orbitR=planetR*moon.dist_fac*moonOrbitMult;
    } else {
      orbitR=Math.max(planetR*2, planetR*6*moon.au/maxAu)*moonOrbitMult;
    }
    drawSingleMoon(moon,px,py,orbitR,days,moonSizeMult);
  }
}

function drawSingleMoon(moon,px,py,orbitR,days,sizeMult=1){
  // Orbit ring
  ctx.beginPath();
  ctx.arc(px,py,orbitR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.stroke();
  // Position
  const ang=((moon.mean_lon + 360*days/moon.period)%360)*Math.PI/180;
  const mx=px+orbitR*Math.cos(ang);
  const my=py-orbitR*Math.sin(ang);
  const mr=moon.size/2*sizeMult*(state.moonScale||1);
  // Glow
  const gr=ctx.createRadialGradient(mx,my,0,mx,my,mr*2.2);
  gr.addColorStop(0,colorAlpha(moon.color,0.20));
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(mx,my,mr*2.2,0,Math.PI*2);
  ctx.fillStyle=gr; ctx.fill();
  // Disk
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2);
  ctx.fillStyle=moon.color;
  ctx.fill();
}

function drawZodiacSectors(w,h){
  const half=Math.min(w,h)/2;
  const outerR=half*0.975;
  for(let i=0;i<12;i++){
    const startDeg=i*30, endDeg=startDeg+30;
    const startR=startDeg*Math.PI/180, endR=endDeg*Math.PI/180;
    const {r,g,b}=hexToRgb(ZODIAC[i].color);
    const alpha=i%2===0?0.086:0.051;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,outerR,-startR,-endR,true);
    ctx.closePath();
    ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.10)';
  ctx.lineWidth=0.8;
  for(let i=0;i<12;i++){
    const ar=i*30*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(outerR*Math.cos(-ar),outerR*Math.sin(-ar));
    ctx.stroke();
  }
}

function drawZodiac(w,h){
  const half=Math.min(w,h)/2;
  const outerR=half*0.975;
  const innerR=half*0.80;
  const labelR=(outerR+innerR)/2;
  const bandH=outerR-innerR;
  const names=state.lang==='uk'?ZODIAC_NAMES_UK:ZODIAC_NAMES_EN;

  for(let i=0;i<12;i++){
    const startDeg=i*30, endDeg=startDeg+30;
    const {r,g,b}=hexToRgb(ZODIAC[i].color);
    // Annular sector
    ctx.beginPath();
    ctx.arc(0,0,outerR,-startDeg*Math.PI/180,-(endDeg)*Math.PI/180,true);
    ctx.arc(0,0,innerR,-(endDeg)*Math.PI/180,-startDeg*Math.PI/180,false);
    ctx.closePath();
    ctx.fillStyle=`rgba(${r},${g},${b},${i%2===0?0.118:0.078})`;
    ctx.fill();
    // Boundary
    ctx.strokeStyle=`rgba(${r},${g},${b},0.275)`;
    ctx.lineWidth=1;
    ctx.beginPath();
    const ar=startDeg*Math.PI/180;
    ctx.moveTo(innerR*Math.cos(-ar),innerR*Math.sin(-ar));
    ctx.lineTo(outerR*Math.cos(-ar),outerR*Math.sin(-ar));
    ctx.stroke();
    // Labels
    const mid=startDeg+15;
    const mr2=mid*Math.PI/180;
    const lx=labelR*Math.cos(-mr2);
    const ly=labelR*Math.sin(-mr2);
    ctx.save();
    ctx.translate(lx,ly);
    ctx.rotate(mr2);
    const symH=Math.min(bandH*0.52,16)*state.zodiacFontScale;
    const nameH=Math.min(bandH*0.32,11)*state.zodiacFontScale;
    ctx.textAlign='center';
    ctx.fillStyle=`rgba(${r},${g},${b},0.90)`;
    ctx.font=`${Math.max(9,Math.round(symH))}px 'Segoe UI Symbol','Segoe UI Emoji',Arial`;
    ctx.fillText(ZODIAC[i].symbol,0,0);
    ctx.fillStyle=`rgba(${r},${g},${b},0.67)`;
    ctx.font=`${Math.max(6,Math.round(nameH))}px 'Segoe UI',Arial`;
    ctx.fillText(names[i]||ZODIAC[i].name,0,nameH+2);
    ctx.restore();
  }
}

// Fixed ring radii for geo+even mode: inner planets (Mercury/Venus/Mars) get
// double spacing; outer planets (Jupiter–Neptune) fill the remaining half.
// zodI = zodiacInner = evenStep*(PLANETS.length+1)
function geoEvenRingR(name, evenStep){
  // Fixed ring fractions of zodiacInner (= evenStep*(PLANETS.length+1)).
  // Inner planets get proportionally MORE space so they don't crowd the Sun.
  const zodI = evenStep * (PLANETS.length + 1);
  const frac = {
    Mercury: 0.34,
    Venus:   0.51,
    Mars:    0.65,
    Jupiter: 0.74,
    Saturn:  0.82,
    Uranus:  0.89,
    Neptune: 0.96,
  };
  return (frac[name] || 0.34) * zodI;
}

function drawTrails(scale,earthHx,earthHy,evenStep){
  const STEP=5, HALF=550;
  const earthP=PLANETS[2], earthIdx=2;
  const curAbs=Math.round((state.currentDate-state.sliderMin)/86400000);
  const rangeHi=Math.round((state.sliderMax-state.sliderMin)/86400000);
  const rAuE=earthP.au*scale;

  for(const planet of PLANETS){
    if(planet.name==='Earth'||planet.name!==state.selectedPlanet) continue;
    const pIdx=PLANETS.indexOf(planet);
    const _geoEven=state.geoMode&&state.evenMode;
    const rVisP=(!_geoEven&&state.evenMode)?evenStep*(pIdx+1):planet.au*scale;
    const rVisE=(!_geoEven&&state.evenMode)?evenStep*(earthIdx+1):earthP.au*scale;
    const rAuP=planet.au*scale;
    const pts=[], lons=[];
    let lo=Math.max(0,curAbs-HALF);
    let hi=Math.min(rangeHi,curAbs+HALF);
    lo=Math.floor(lo/STEP)*STEP;

    for(let day=lo;day<=hi;day+=STEP){
      const d=dateFromOffset(state.sliderMin,day);
      const angP=planetAngleDeg(planet,d)*Math.PI/180;
      const angE=planetAngleDeg(earthP,d)*Math.PI/180;
      let txP,tyP;
      if(_geoEven){
        // Mirror geo+even projection: Sun at geocentric dir, sp from geoEvenRingR
        const zodIT=evenStep*(PLANETS.length+1);
        const sunRT=zodIT*0.18;                // matches geo+even sunEvR fraction
        const sunXT=sunRT*Math.cos(angE+Math.PI);
        const sunYT=-sunRT*Math.sin(angE+Math.PI);
        const ringRT=geoEvenRingR(planet.name,evenStep);
        const avgGeoT=Math.sqrt(earthP.au*earthP.au+planet.au*planet.au);
        const spT=ringRT/(avgGeoT*scale);
        txP=earthHx+sunXT+spT*planet.au*scale*Math.cos(angP);
        tyP=earthHy+sunYT-spT*planet.au*scale*Math.sin(angP);
      } else {
        txP=rVisP*Math.cos(angP)-rVisE*Math.cos(angE)+earthHx;
        tyP=-rVisP*Math.sin(angP)+rVisE*Math.sin(angE)+earthHy;
      }
      const gx=rAuP*Math.cos(angP)-rAuE*Math.cos(angE);
      const gy=-(-rAuP*Math.sin(angP)+rAuE*Math.sin(angE));
      const lon=((Math.atan2(gy,gx)*180/Math.PI)%360+360)%360;
      pts.push({x:txP,y:tyP,day});
      lons.push(lon);
    }
    if(pts.length<3) continue;

    // Draw polyline
    for(let i=0;i<pts.length-1;i++){
      const alpha=pts[i].day<curAbs?0.196:0.392;
      const {r,g,b}=hexToRgb(planet.color);
      ctx.beginPath();
      ctx.moveTo(pts[i].x,pts[i].y);
      ctx.lineTo(pts[i+1].x,pts[i+1].y);
      ctx.strokeStyle=`rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth=1.2;
      ctx.stroke();
    }

    // Retrograde stations
    for(let i=1;i<pts.length-1;i++){
      const dp=lonDiff(lons[i-1],lons[i]);
      const dn=lonDiff(lons[i],lons[i+1]);
      if(dp>0.05&&dn<-0.05){
        drawStation(pts[i].x,pts[i].y,'rgba(255,90,50,0.90)','rgba(255,160,120,0.86)','R');
      } else if(dp<-0.05&&dn>0.05){
        drawStation(pts[i].x,pts[i].y,'rgba(60,210,170,0.90)','rgba(120,230,200,0.86)','D');
      }
    }
  }
}

function drawStation(x,y,dotColor,lblColor,lbl){
  ctx.beginPath();
  ctx.arc(x,y,4.5,0,Math.PI*2);
  ctx.fillStyle=dotColor;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=0.8;
  ctx.stroke();
  ctx.fillStyle=lblColor;
  ctx.font='bold 8px Segoe UI,Arial';
  ctx.fillText(lbl,x+6,y+4);
}

function currentTimeStr(){
  const n=new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function offsetToEventTime(fractionalOffset, kind){
  // The fractional part encodes sub-day time: frac * 24 * 60 = total minutes
  const frac = fractionalOffset - Math.floor(fractionalOffset);
  const totalMin = Math.round(frac * 24 * 60);
  const h = Math.floor(totalMin / 60) % 24;
  const m = totalMin % 60;
  const sym = ST_SYMBOLS[kind] || '';
  return `${sym} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function drawDateLabel(w,h){
  const d=state.currentDate;
  const L=LOCALE[state.lang]||LOCALE.en;
  const dateTxt=`${L.months[d.getUTCMonth()]} ${String(d.getUTCDate()).padStart(2,'0')}, ${d.getUTCFullYear()}`;
  const timeTxt = state.eventTimeSuffix !== null ? state.eventTimeSuffix : `⏱ ${currentTimeStr()}`;
  const fullTxt=`${dateTxt}  ${timeTxt}`;
  ctx.font=`bold 14px 'Segoe UI',Arial`;
  ctx.fillStyle='rgba(200,220,255,0.82)';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText(fullTxt,12,h-20);
}

function drawMoonPhaseOverlay(w,h){
  const {symbol,name,illum,angle}=moonPhaseInfo(state.currentDate);
  const wfs=state.widgetFontScale||1.0;
  const pad=12, diskR=34, boxW=170, boxH=diskR*2+52;
  const bx=pad, by=pad;

  // Panel background
  ctx.beginPath();
  roundRect(ctx,bx,by,boxW,boxH,8);
  ctx.fillStyle='rgba(8,15,38,0.784)';
  ctx.fill();
  ctx.strokeStyle='rgba(100,140,200,0.47)';
  ctx.lineWidth=1;
  ctx.stroke();

  const mcx=bx+diskR+pad;
  const mcy=by+diskR+pad;

  // Dark base
  ctx.beginPath();
  ctx.arc(mcx,mcy,diskR,0,Math.PI*2);
  ctx.fillStyle='#1e2030';
  ctx.fill();

  // Lit region
  drawMoonLitRegion(mcx,mcy,diskR,angle);

  // Rim
  ctx.beginPath();
  ctx.arc(mcx,mcy,diskR,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,180,160,0.31)';
  ctx.lineWidth=0.8;
  ctx.stroke();

  // Text
  const tx=bx+diskR*2+pad*2;
  const tw=boxW-diskR*2-pad*3;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.round(10*wfs)}px 'Segoe UI',Arial`;
  ctx.fillStyle='rgba(210,230,255,0.90)';
  ctx.fillText(name,tx,by+pad+9);
  ctx.font=`${Math.round(9*wfs)}px 'Segoe UI',Arial`;
  ctx.fillStyle='rgba(150,190,240,0.784)';
  ctx.fillText(`${(LOCALE[state.lang]||LOCALE.en).illuminated}: ${illum}%`,tx,by+pad+29);

  // Bar
  const barY=by+pad+44, barX=tx, barW=Math.min(tw,80), barH=6;
  ctx.beginPath(); roundRect(ctx,barX,barY,barW,barH,3);
  ctx.fillStyle='rgba(30,40,70,1)'; ctx.fill();
  ctx.beginPath(); roundRect(ctx,barX,barY,barW*illum/100,barH,3);
  ctx.fillStyle='rgba(200,220,255,0.784)'; ctx.fill();
}

// ─────────────────────────────────────────────────────────────────────────────
// SUNRISE / SUNSET CALCULATION + SUN ARC OVERLAY
// ─────────────────────────────────────────────────────────────────────────────
let geoLat=null, geoLon=null, geoPending=false;
function requestGeolocation(){
  if(geoPending||geoLat!==null) return;
  geoPending=true;
  if(!navigator.geolocation){ geoLat=51.5; geoLon=0; geoPending=false; return; } // fallback London
  navigator.geolocation.getCurrentPosition(
    pos=>{ geoLat=pos.coords.latitude; geoLon=pos.coords.longitude; geoPending=false; draw(); },
    ()=>{ geoLat=51.5; geoLon=0; geoPending=false; draw(); },
    {timeout:8000}
  );
}
// Request on load
requestGeolocation();

/**
 * Compute sunrise/sunset for a given UTC date and observer lat/lon.
 * Returns {rise, set, transAlt, decl} where rise/set are UTC hours (0‑24),
 * or null if polar day/night.
 * Uses NOAA/Astronomical almanac algorithm (accurate ±1 min).
 */
function sunriseSunset(dateUTC, lat, lon){
  const rad=Math.PI/180, deg=180/Math.PI;
  const jd=(dateUTC.getTime()/86400000)+2440587.5;
  const n=jd-2451545.0;
  // Mean longitude / anomaly
  const L=((280.46+0.9856474*n)%360+360)%360;
  const g=((357.528+0.9856003*n)%360+360)%360*rad;
  const lam=(L+1.915*Math.sin(g)+0.020*Math.sin(2*g));
  const eps=(23.439-0.0000004*n)*rad;
  const lamR=lam*rad;
  const decl=Math.asin(Math.sin(eps)*Math.sin(lamR))*deg; // solar declination °
  const eqTime=720*((n/36525*0.0000538+0.000075) // simplified EqT in minutes
    - Math.sin(g)*0.004697 - Math.sin(2*g)*0.000141);
  // Hour angle of sunrise: cos(H)=(sin(-0.833°)-sin(lat)*sin(decl))/(cos(lat)*cos(decl))
  const sinD=Math.sin(decl*rad), cosD=Math.cos(decl*rad);
  const cosL=Math.cos(lat*rad), sinL=Math.sin(lat*rad);
  const cosH=(Math.sin(-0.8333*rad)-sinL*sinD)/(cosL*cosD);
  if(cosH<-1) return {rise:null,set:null,decl,polarDay:true};  // midnight sun
  if(cosH>1)  return {rise:null,set:null,decl,polarDay:false}; // polar night
  const H=Math.acos(cosH)*deg; // H in degrees
  // Solar noon UTC minutes = 720 - 4*lon - eqTime
  const noonMin=720 - 4*lon - eqTime;
  const rise=(noonMin - H*4)/60; // hours UTC
  const set =(noonMin + H*4)/60;
  // Max solar altitude at transit
  const transAlt=(90-lat+decl)*(lat>=0?1:-1);
  return {rise:((rise%24)+24)%24, set:((set%24)+24)%24, decl, transAlt:Math.min(90,Math.abs(90-lat+decl)), polarDay:null};
}

function fmtHour(h){
  if(h==null) return '--:--';
  const hh=Math.floor(((h%24)+24)%24);
  const mm=Math.round((h-Math.floor(h))*60);
  return `${String(hh).padStart(2,'0')}:${String(mm<60?mm:0).padStart(2,'0')}`;
}

function drawSunArcOverlay(w,h){
  // Helper: daylight duration (hours) for a given solar declination and latitude
  function daylightHours(decl_deg, lat_deg){
    const rad=Math.PI/180;
    const cosH=(Math.sin(-0.8333*rad)-Math.sin(lat_deg*rad)*Math.sin(decl_deg*rad))
               /(Math.cos(lat_deg*rad)*Math.cos(decl_deg*rad));
    if(cosH<=-1) return 24; if(cosH>=1) return 0;
    return Math.acos(cosH)*(24/Math.PI);
  }

  const wfs=state.widgetFontScale||1.0;
  const pad=12;
  const moonBoxH=34*2+52;
  const bx=pad, by=pad+moonBoxH+6;
  // Fixed box width = longest-day arc diameter + padding
  const boxW=220, boxH=96;
  const horizonFromBottom=22;

  if(geoLat===null){
    ctx.save();
    ctx.beginPath(); roundRect(ctx,bx,by,boxW,boxH,8);
    ctx.fillStyle='rgba(8,15,38,0.75)'; ctx.fill();
    ctx.strokeStyle='rgba(100,140,200,0.40)'; ctx.lineWidth=1; ctx.stroke();
    ctx.font=`${Math.round(9*wfs)}px "Segoe UI",Arial`; ctx.fillStyle='rgba(150,180,220,0.7)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('Requesting location…',bx+10,by+boxH/2);
    ctx.restore(); return;
  }

  const ss=sunriseSunset(state.currentDate, geoLat, geoLon);

  // Max daylight for this latitude (solstice decls ±23.44°)
  const maxDur=Math.max(daylightHours(23.44,geoLat), daylightHours(-23.44,geoLat));
  let curDur=0;
  if(ss.polarDay===true) curDur=24;
  else if(ss.polarDay===false) curDur=0;
  else { const r2=ss.rise,s2=ss.set; curDur=s2>r2?s2-r2:(s2+24)-r2; }

  // Arc radius: max radius fills box, current day scales proportionally
  const arcMaxR=(boxW-20)/2;
  const arcR=Math.max(8, arcMaxR*(curDur/Math.max(maxDur,1)));
  const arcCX=bx+boxW/2;
  const arcCY=by+boxH-horizonFromBottom;

  // Panel background
  ctx.save();
  ctx.beginPath(); roundRect(ctx,bx,by,boxW,boxH,8);
  ctx.fillStyle='rgba(8,15,38,0.78)'; ctx.fill();
  ctx.strokeStyle='rgba(100,140,200,0.40)'; ctx.lineWidth=1; ctx.stroke();

  // Horizon line
  ctx.beginPath();
  ctx.moveTo(bx+6,arcCY); ctx.lineTo(bx+boxW-6,arcCY);
  ctx.strokeStyle='rgba(100,150,200,0.40)'; ctx.lineWidth=1; ctx.stroke();

  if(ss.polarDay===true){
    ctx.font=`bold ${Math.round(10*wfs)}px "Segoe UI",Arial`; ctx.fillStyle='rgba(255,230,120,0.85)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('☀ Midnight Sun',arcCX,by+boxH/2);
    ctx.restore(); return;
  }
  if(ss.polarDay===false){
    ctx.font=`bold ${Math.round(10*wfs)}px "Segoe UI",Arial`; ctx.fillStyle='rgba(160,200,255,0.70)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Polar Night',arcCX,by+boxH/2);
    ctx.restore(); return;
  }

  // Max-day guide arc (faint dashed outline)
  ctx.beginPath();
  ctx.arc(arcCX,arcCY,arcMaxR,Math.PI,0);
  ctx.strokeStyle='rgba(80,120,200,0.18)'; ctx.lineWidth=1;
  ctx.setLineDash([2,5]); ctx.stroke(); ctx.setLineDash([]);

  // Sky gradient fill for today's arc
  const skyGrad=ctx.createLinearGradient(arcCX,arcCY-arcR, arcCX,arcCY);
  skyGrad.addColorStop(0,'rgba(20,60,140,0.55)');
  skyGrad.addColorStop(1,'rgba(20,60,140,0.05)');
  ctx.beginPath(); ctx.arc(arcCX,arcCY,arcR,Math.PI,0); ctx.closePath();
  ctx.fillStyle=skyGrad; ctx.fill();

  // Today's arc path
  ctx.beginPath();
  ctx.arc(arcCX,arcCY,arcR,Math.PI,0);
  ctx.strokeStyle='rgba(255,200,80,0.42)'; ctx.lineWidth=1.3;
  ctx.setLineDash([3,4]); ctx.stroke(); ctx.setLineDash([]);

  // Tick + label at rise / set endpoints (convert UTC → local browser time)
  const _tzH=-new Date().getTimezoneOffset()/60;
  const riseH=ss.rise!=null?(ss.rise+_tzH+48)%24:null;
  const setH =ss.set !=null?(ss.set +_tzH+48)%24:null;
  function arcTick(angle, label, align){
    const tx=arcCX+arcR*Math.cos(angle), ty=arcCY;
    ctx.beginPath(); ctx.moveTo(tx,ty-6); ctx.lineTo(tx,ty+6);
    ctx.strokeStyle='rgba(255,200,80,0.70)'; ctx.lineWidth=1.4; ctx.stroke();
    ctx.font=`bold ${Math.round(10*wfs)}px "Segoe UI",Arial`;
    ctx.fillStyle='rgba(255,215,120,0.92)';
    ctx.textAlign=align; ctx.textBaseline='top';
    ctx.fillText(label, tx+(align==='left'?5:-5), ty+7);
  }
  arcTick(Math.PI, fmtHour(riseH), 'left');
  arcTick(0,       fmtHour(setH),  'right');

  // Location + daylight hours corner label
  ctx.font=`${Math.round(8*wfs)}px "Segoe UI",Arial`; ctx.fillStyle='rgba(150,190,240,0.60)';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(`${geoLat>=0?'N':'S'}${Math.abs(geoLat).toFixed(1)}°  ◑ ${curDur.toFixed(1)}h`,bx+5,by+4);

  ctx.restore();
}

function drawMoonLitRegion(mcx,mcy,diskR,angle){
  if(angle<0.5||angle>359.5) return; // new moon
  if(Math.abs(angle-180)<0.5){       // full moon
    const mg=ctx.createRadialGradient(mcx-diskR*0.25,mcy-diskR*0.25,0,mcx,mcy,diskR*1.3);
    mg.addColorStop(0,'#f0f0dc'); mg.addColorStop(1,'#b4b4a0');
    ctx.beginPath(); ctx.arc(mcx,mcy,diskR,0,Math.PI*2);
    ctx.fillStyle=mg; ctx.fill();
    return;
  }

  const K=0.5523;
  const phaseR=angle*Math.PI/180;
  ctx.save();
  ctx.beginPath(); ctx.arc(mcx,mcy,diskR,0,Math.PI*2);
  ctx.clip();

  const mg=ctx.createRadialGradient(mcx-diskR*0.25,mcy-diskR*0.25,0,mcx,mcy,diskR*1.3);
  mg.addColorStop(0,'#f0f0dc'); mg.addColorStop(1,'#b4b4a0');

  if(angle<180){ // Waxing
    const tx=Math.cos(phaseR)*diskR;
    ctx.beginPath();
    ctx.arc(mcx,mcy,diskR,-Math.PI/2,Math.PI/2); // right limb
    ctx.bezierCurveTo(mcx+K*tx,mcy+diskR, mcx+tx,mcy+K*diskR, mcx+tx,mcy);
    ctx.bezierCurveTo(mcx+tx,mcy-K*diskR, mcx+K*tx,mcy-diskR, mcx,mcy-diskR);
    ctx.closePath();
  } else { // Waning
    const tx=-Math.cos(phaseR)*diskR;
    ctx.beginPath();
    ctx.arc(mcx,mcy,diskR,-Math.PI/2,Math.PI/2,true); // left limb: top→LEFT→bottom (anticlockwise)
    ctx.bezierCurveTo(mcx+K*tx,mcy+diskR, mcx+tx,mcy+K*diskR, mcx+tx,mcy);
    ctx.bezierCurveTo(mcx+tx,mcy-K*diskR, mcx+K*tx,mcy-diskR, mcx,mcy-diskR);
    ctx.closePath();
  }
  ctx.fillStyle=mg;
  ctx.fill();
  ctx.restore();
}

function drawInfoPanel(w,h){
  const planet=PLANETS.find(p=>p.name===state.selectedPlanet);
  if(!planet) return;
  const wfs=state.widgetFontScale||1.0;

  const earth=PLANETS[2];
  let distStr='—';
  if(planet.name!=='Earth'){
    const angE=planetAngleDeg(earth,state.currentDate)*Math.PI/180;
    const angP=planetAngleDeg(planet,state.currentDate)*Math.PI/180;
    const ex=earth.au*Math.cos(angE), ey=earth.au*Math.sin(angE);
    const px2=planet.au*Math.cos(angP), py2=planet.au*Math.sin(angP);
    const distAu=Math.hypot(px2-ex,py2-ey);
    const distKm=distAu*149597870.7;
    distStr=distKm>=1e6?`${(distKm/1e6).toFixed(2)} M km`:`${Math.round(distKm).toLocaleString()} km`;
  }

  const L=LOCALE[state.lang]||LOCALE.en;
  const lbl=L.infoPanelLabels;
  const lines=[
    [lbl[0],`${planet.period.toFixed(1)} days`],
    [lbl[1],`${planet.radius_km.toLocaleString()} km`],
    [lbl[2],`${planet.orbital_speed_km_s} km/s`],
    [lbl[3],planet.spin_days<0?`${Math.abs(planet.spin_days).toFixed(3)} d (retro)`:`${planet.spin_days.toFixed(3)} d`],
    [lbl[4],`${planet.au.toFixed(2)} AU`],
    [lbl[5],distStr],
  ];

  const pad=14, lineH=Math.round(26*wfs), titleH=Math.round(30*wfs);
  const panelW=Math.round(260*Math.max(1,wfs)), panelH=pad*2+titleH+lines.length*lineH+4;
  // Place below sun-arc panel (moon box 120px + 6gap + sunArc 96px + 6gap = 228px from top)
  const px0=pad, py0=12+120+6+96+6;

  const {r,g,b}=hexToRgb(planet.color);
  ctx.beginPath(); roundRect(ctx,px0,py0,panelW,panelH,8);
  ctx.fillStyle='rgba(10,18,40,0.843)'; ctx.fill();
  ctx.strokeStyle=`rgba(${r},${g},${b},0.706)`; ctx.lineWidth=1.5; ctx.stroke();

  ctx.textAlign='left'; ctx.textBaseline='middle';
  const _ipL=LOCALE[state.lang]||LOCALE.en;
  ctx.font=`bold ${Math.round(14*wfs)}px 'Segoe UI',Arial`;
  ctx.fillStyle=lighten(planet.color,55);
  ctx.fillText((_ipL.planetNames[planet.name]||planet.name),px0+pad,py0+pad+titleH/2);

  const sepY=py0+pad+titleH;
  ctx.beginPath(); ctx.moveTo(px0+pad,sepY); ctx.lineTo(px0+panelW-pad,sepY);
  ctx.strokeStyle=`rgba(${r},${g},${b},0.31)`; ctx.lineWidth=1; ctx.stroke();

  const lblW=Math.round(120*Math.max(1,wfs));
  for(let i=0;i<lines.length;i++){
    const rowY=sepY+4+i*lineH+lineH/2;
    ctx.font=`${Math.round(10*wfs)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(140,170,210,0.82)';
    ctx.fillText(lines[i][0]+':',px0+pad,rowY);
    ctx.font=`bold ${Math.round(10*wfs)}px 'Segoe UI',Arial`;
    ctx.fillStyle='rgba(220,235,255,0.94)';
    ctx.fillText(lines[i][1],px0+pad+lblW,rowY);
  }

  // Astrology section — only when zodiac ring is visible
  if(state.showZodiac || state.showSectors){
    const zodiacIdx=Math.floor(geoEclLonDeg(planet,state.currentDate)/30);
    const signName=((LOCALE[state.lang]||LOCALE.en).zodiacNames||ZODIAC_NAMES_EN)[zodiacIdx];
    const astroTxt=(ASTRO_PLANET_SIGN[state.lang]||ASTRO_PLANET_SIGN.en)[planet.name]?.[zodiacIdx]||'';
    if(astroTxt){
      const astW=panelW, astPad=10;
      const words=astroTxt.split(' ');
      // word-wrap into lines of ~astW-2*astPad px at scaled font
      ctx.font=`${Math.round(9*wfs)}px 'Segoe UI',Arial`;
      const maxLineW=astW-astPad*2;
      const wrapped=[];
      let cur='';
      for(const w of words){
        const test=cur?cur+' '+w:w;
        if(ctx.measureText(test).width>maxLineW&&cur){wrapped.push(cur);cur=w;}else cur=test;
      }
      if(cur) wrapped.push(cur);
      const astH=16+wrapped.length*Math.round(14*wfs)+astPad;
      const ay=py0+panelH+4;
      ctx.beginPath(); roundRect(ctx,px0,ay,astW,astH,8);
      ctx.fillStyle='rgba(10,18,40,0.82)'; ctx.fill();
      ctx.strokeStyle=`rgba(${r},${g},${b},0.35)`; ctx.lineWidth=1; ctx.stroke();
      ctx.font=`bold ${Math.round(9*wfs)}px 'Segoe UI',Arial`;
      ctx.fillStyle=`rgba(${r},${g},${b},0.9)`;
      ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(`${_ipL.planetNames[planet.name]||planet.name} in ${signName}`,px0+astPad,ay+6);
      ctx.font=`${Math.round(9*wfs)}px 'Segoe UI',Arial`;
      ctx.fillStyle='rgba(190,210,240,0.88)';
      wrapped.forEach((line,i)=>ctx.fillText(line,px0+astPad,ay+6+Math.round(16*wfs)+i*Math.round(14*wfs)));
    }
  }
}

function roundRect(c,x,y,w,h,r){
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}

// SLIDER CANVAS (ticks, alignment marks, solar terms)
// ─────────────────────────────────────────────────────────────────────────────
const sliderCanvas=document.getElementById('sliderCanvas');
const sctx=sliderCanvas.getContext('2d');

function resizeSliderCanvas(){
  const wrap=document.getElementById('sliderWrap');
  sliderCanvas.width=wrap.clientWidth;
  sliderCanvas.height=wrap.clientHeight;
  drawSliderOverlay();
}

function drawSliderOverlay(){
  const sc=sliderCanvas;
  const w=sc.width, h=sc.height;
  if(!w||!h) return;
  sctx.clearRect(0,0,w,h);

  const slider=document.getElementById('timeSlider');
  const total=parseInt(slider.max)||1;
  const gx=8, gw=w-16, gy=Math.round(h/2);

  // Solar terms
  for(const st of state.solarTerms){
    const frac=st.offset/total;
    if(frac<0||frac>1) continue;
    const x=Math.round(gx+frac*gw);
    const col=ST_COLORS[st.kind];
    const tkH=st.kind===0?7:10;
    sctx.beginPath();
    sctx.moveTo(x,gy-tkH); sctx.lineTo(x,gy+tkH);
    sctx.strokeStyle=col; sctx.lineWidth=1.2; sctx.stroke();
    sctx.fillStyle=col;
    sctx.font=`8px 'Segoe UI Symbol','Segoe UI Emoji',Arial`;
    sctx.textAlign='center'; sctx.textBaseline='alphabetic';
    sctx.fillText(ST_SYMBOLS[st.kind],x,gy-tkH-1);
  }

  // Day sub-ticks — scale step by pixel density
  const nDaysTotal=Math.round((state.sliderMax-state.sliderMin)/86400000);
  const pixPerDay=gw/Math.max(1,nDaysTotal);
  const dayStep=pixPerDay>=8?1:pixPerDay>=3?3:pixPerDay>=1.5?7:pixPerDay>=0.8?14:pixPerDay>=0.4?30:0;
  if(dayStep>0){
    let dd=new Date(state.sliderMin.getTime());
    dd=new Date(dd.getTime()+86400000); // skip day 0
    const dMaxT=state.sliderMax.getTime();
    while(dd.getTime()<=dMaxT){
      const dayOff=Math.round((dd.getTime()-state.sliderMin.getTime())/86400000);
      if(dayOff%dayStep===0&&dd.getUTCDate()!==1){
        const fx=Math.round(gx+dayOff/total*gw);
        sctx.strokeStyle='rgba(80,120,180,0.45)'; sctx.lineWidth=0.8;
        const th=dayStep<=1?3:dayStep<=7?2:1.5;
        sctx.beginPath(); sctx.moveTo(fx,gy-th); sctx.lineTo(fx,gy+th); sctx.stroke();
      }
      dd=new Date(dd.getTime()+86400000);
    }
  }

  // Year/month ticks
  const dMin=state.sliderMin;
  const dMax=state.sliderMax;
  const nMonths=(dMax.getUTCFullYear()-dMin.getUTCFullYear())*12+dMax.getUTCMonth()-dMin.getUTCMonth();
  const showAllMonths=nMonths<=48;
  const showQtrMonths=nMonths<=120;
  const {getUTCFullYear:gY,getUTCMonth:gM}=Date.prototype;
  let yr=gY.call(dMin), mo=gM.call(dMin)+1;
  const dMax2=new Date(dMax.getTime());
  while(true){
    const tickD=new Date(Date.UTC(yr,mo-1,1));
    if(tickD>dMax2) break;
    if(tickD>=dMin){
      const offset=Math.round((tickD-dMin)/86400000);
      const x=Math.round(gx+offset/total*gw);
      if(mo===1){
        sctx.strokeStyle='rgba(180,215,255,0.92)'; sctx.lineWidth=1.5;
        sctx.beginPath(); sctx.moveTo(x,gy-13); sctx.lineTo(x,gy+13); sctx.stroke();
        sctx.fillStyle='rgba(180,215,255,0.95)';
        sctx.font=`bold ${Math.max(6,Math.round(8*state.monthFontScale))}px 'Segoe UI',Arial`;
        sctx.textAlign='center'; sctx.textBaseline='alphabetic';
        sctx.fillText(String(yr),x,gy-15);
      } else {
        const showLbl=showAllMonths||(showQtrMonths&&[4,7,10].includes(mo));
        sctx.strokeStyle='rgba(110,155,220,0.72)'; sctx.lineWidth=1.0;
        sctx.beginPath(); sctx.moveTo(x,gy-7); sctx.lineTo(x,gy+7); sctx.stroke();
        if(showLbl){
          const ABBR=(LOCALE[state.lang]||LOCALE.en).monthsAbbr;
          sctx.fillStyle='rgba(130,170,225,0.88)';
          sctx.font=`${Math.max(6,Math.round(7*state.monthFontScale))}px 'Segoe UI',Arial`;
          sctx.textAlign='center'; sctx.textBaseline='top';
          sctx.fillText(ABBR[mo],x,gy+8);
        }
      }
    }
    mo++;
    if(mo>12){mo=1;yr++;}
  }

  // Alignment marks
  if(state.showMarks){
    for(const mark of state.alignmentMarks){
      const frac=mark.offset/total;
      const x=Math.round(gx+frac*gw);
      sctx.beginPath();
      sctx.moveTo(x,gy-5); sctx.lineTo(x,gy+5);
      sctx.strokeStyle=alignMarkColor(mark.count);
      sctx.lineWidth=1.5; sctx.stroke();
    }
  }
}

function syncAllUI(){
  // Slider range labels
  document.getElementById('lblMin').textContent=dateToISO(state.sliderMin);
  document.getElementById('lblMax').textContent=dateToISO(state.sliderMax);
  // Slider value
  const total=Math.round((state.sliderMax-state.sliderMin)/86400000);
  const slider=document.getElementById('timeSlider');
  slider.max=total;
  const curOffset=Math.max(0,Math.min(total,Math.round((state.currentDate-state.sliderMin)/86400000)));
  slider.value=curOffset;
  // Zoom
  const zv=Math.round(state.zoom*100);
  document.getElementById('zoomSlider').value=zv;
  document.getElementById('lblZoom').textContent=(state.zoom).toFixed(2)+'×';
  // Planet scale
  const pv=Math.round(state.planetScale*100);
  document.getElementById('planetSlider').value=pv;
  document.getElementById('lblPlanet').textContent=(state.planetScale).toFixed(2)+'×';
  const sv=Math.round(state.sunScale*100);
  document.getElementById('sunSlider').value=sv;
  document.getElementById('lblSun').textContent=(state.sunScale).toFixed(2)+'×';
  const mv=Math.round(state.moonScale*100);
  document.getElementById('moonSlider').value=mv;
  document.getElementById('lblMoon').textContent=(state.moonScale).toFixed(2)+'×';
  // Buttons
  setBtn('btnEven',state.evenMode);
  setBtn('btnGeo',state.geoMode);
  setBtn('btnZodiac',state.showZodiac);
  setBtn('btnSectors',state.showSectors);
  setBtn('btnTrail',state.showTrail);
  setBtn('btnInfo',state.showInfo);
  setBtn('btnMarks',state.showMarks);
  setBtn('btnSunLight',state.showSunLight);
  setBtn('btnGeoLines',state.showGeoLines);
  setBtn('btnWarp',state.warpMode);
  setBtn('btnConst',state.showConstellations);
  document.getElementById('warpSpeedSlider').value=Math.round((state.warpSpeed||0.15)*100);
  document.getElementById('constScaleSlider').value=Math.round((state.constScale||1)*100);
  // Zodiac & sector & trail buttons only in geo mode
  document.getElementById('btnZodiac').style.display=state.geoMode?'':'none';
  document.getElementById('btnSectors').style.display=state.geoMode?'':'none';
  document.getElementById('btnTrail').style.display=state.geoMode?'':'none';

let animTimer=null;
let animLastTime=null;
function tickPlay(ts){
  if(!state.playing) return;
  if(animLastTime===null) animLastTime=ts;
  const dt=Math.min(ts-animLastTime,100); // cap to avoid jump after tab switch
  animLastTime=ts;
  const slider=document.getElementById('timeSlider');
  const total=parseInt(slider.max)||1;
  // 1.0× speed = 1 day per 40ms; fractional advance for smooth motion
  let v=parseFloat(slider.value)+dt/40*state.animSpeed;
  if(v>total) v=0;
  slider.value=v;
  state.currentDate=dateFromOffset(state.sliderMin,v);
  draw();
  animTimer=requestAnimationFrame(tickPlay);
}

// Extract YouTube video ID from URL or bare ID
function extractYTId(input){
  if(!input) return '';
  // youtu.be/ID or youtube.com/watch?v=ID or just ID
  const m=input.match(/(?:youtu\.be\/|[?&]v=)([\w-]{11})/);
  return m?m[1]:input.replace(/[^\w-]/g,'').slice(0,11);
}

// ── Touch support (mobile / iPad) ────────────────────────────
(function(){
  let _tx=null,_ty=null,_moved=false,_pinchDist=null;
  function pinchLen(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  cv.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=cv.getBoundingClientRect();
    if(e.touches.length===1){
      _tx=e.touches[0].clientX-r.left; _ty=e.touches[0].clientY-r.top;
      _moved=false; _pinchDist=null;
    } else if(e.touches.length===2){
      _pinchDist=pinchLen(e.touches); _tx=null;
    }
  },{passive:false});
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=cv.getBoundingClientRect();
    if(e.touches.length===2){
      const d=pinchLen(e.touches);
      if(_pinchDist!==null){
        const zs=document.getElementById('zoomSlider');
        let v=Math.round(parseFloat(zs.value)*(d/_pinchDist));
        v=Math.max(parseInt(zs.min),Math.min(parseInt(zs.max),v));
        zs.value=v; state.zoom=v/100;
        document.getElementById('lblZoom').textContent=state.zoom.toFixed(2)+'×';
        draw(); saveSettings();
      }
      _pinchDist=d; _tx=null;
    } else if(e.touches.length===1){
      const x=e.touches[0].clientX-r.left, y=e.touches[0].clientY-r.top;
      if(_tx!==null&&Math.hypot(x-_tx,y-_ty)>5) _moved=true;
      if(state.showConstellations){constMouseX=x;constMouseY=y;if(!state.warpMode)draw();}
      _tx=x; _ty=y;
    }
  },{passive:false});
  cv.addEventListener('touchend',e=>{
    e.preventDefault();
    if(e.changedTouches.length===1&&!_moved&&_tx!==null){
      let best=null,bestDist=Infinity;
      for(const [name,pos] of Object.entries(planetScreenPos)){
        const dist=Math.hypot(_tx-pos.x,_ty-pos.y);
        const hitR=Math.max(pos.r*2.2,24);
        if(dist<=hitR&&dist<bestDist){bestDist=dist;best=name;}
      }
      state.selectedPlanet=best===state.selectedPlanet?null:best;
      draw();
    }
    if(e.touches.length===0){
      constMouseX=null;constMouseY=null;
      if(state.showConstellations&&!state.warpMode)draw();
      _pinchDist=null;
    }
  },{passive:false});
})();

function rebuildSliderRange(){
  const slider=document.getElementById('timeSlider');
  const total=Math.round((state.sliderMax-state.sliderMin)/86400000);
  slider.max=total;
  const curOffset=Math.max(0,Math.min(total,Math.round((state.currentDate-state.sliderMin)/86400000)));
  slider.value=curOffset;
  document.getElementById('lblMin').textContent=dateToISO(state.sliderMin);
  document.getElementById('lblMax').textContent=dateToISO(state.sliderMax);
  // Recompute solar terms (quick)
  state.solarTerms=computeSolarTerms(state.sliderMin,state.sliderMax);
  // Alignments can be slow — run async
  recomputeAlignmentsAsync();
  drawSliderOverlay();
}

  document.addEventListener('click',_startMusicOnce,{capture:true,once:true});
  document.addEventListener('keydown',_startMusicOnce,{capture:true,once:true});
}
// Clock ticker – redraw every 30 s so the time stays current
setInterval(()=>{ if(!state.playing) draw(); },30000);
</script>
</body>
